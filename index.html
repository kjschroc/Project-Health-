<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="manifest" href="manifest.json"><title>Project August</title></head><body style="font-family:Arial;background:#121212;color:white;padding:20px"><h1>💙 Project August</h1><label><input id="p" type="checkbox"> Protein Goal</label><br><label><input id="w" type="checkbox"> Water Goal</label><script>["p","w"].forEach(i=>{let e=document.getElementById(i);e.checked=localStorage.getItem(i)=="1";e.onchange=()=>localStorage.setItem(i,e.checked?"1":"0")});if("serviceWorker" in navigator){navigator.serviceWorker.register("sw.js")}</script></body></html>
